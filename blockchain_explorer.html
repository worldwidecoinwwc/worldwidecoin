<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWideCoin Live Blockchain Explorer</title>
    <style>
        :root {
            --primary-color: #f39c12;
            --secondary-color: #e67e22;
            --dark-bg: #1a1a1a;
            --dark-surface: #2d2d2d;
            --dark-text: #ffffff;
            --light-bg: #ffffff;
            --light-surface: #f8f9fa;
            --light-text: #333333;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --error-color: #e74c3c;
            --gradient-1: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            --gradient-2: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            --gradient-3: linear-gradient(45deg, #f39c12, #e67e22);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--light-bg);
            color: var(--light-text);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark-mode {
            background: var(--dark-bg);
            color: var(--dark-text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: var(--gradient-1);
            color: white;
            padding: 30px 0;
            margin-bottom: 40px;
            border-radius: 15px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffffff, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .live-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--success-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .search-section {
            background: var(--light-surface);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            border: 1px solid #e0e0e0;
        }

        body.dark-mode .search-section {
            background: var(--dark-surface);
            border-color: #444;
        }

        .search-form {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }

        body.dark-mode .search-input {
            background: var(--dark-bg);
            border-color: #555;
            color: var(--dark-text);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.1);
        }

        .search-btn {
            padding: 15px 30px;
            background: var(--gradient-3);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(243, 156, 18, 0.3);
        }

        .quick-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(52, 152, 219, 0.1);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-color);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #e0e0e0;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        body.dark-mode .stat-card {
            background: var(--dark-surface);
            border-color: #444;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-3);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-weight: 600;
        }

        body.dark-mode .stat-label {
            color: #aaa;
        }

        .results-section {
            background: white;
            border-radius: 15px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        body.dark-mode .results-section {
            background: var(--dark-surface);
            border-color: #444;
        }

        .results-header {
            background: var(--gradient-1);
            color: white;
            padding: 20px 30px;
            font-weight: 600;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .auto-refresh {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .results-content {
            padding: 30px;
        }

        .block-list, .tx-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .block-item, .tx-item {
            background: var(--light-surface);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        body.dark-mode .block-item,
        body.dark-mode .tx-item {
            background: var(--dark-bg);
            border-color: #444;
        }

        .block-item:hover, .tx-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .block-header, .tx-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .block-height, .tx-hash {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1.1em;
        }

        .block-time, .tx-time {
            color: #666;
            font-size: 0.9em;
        }

        body.dark-mode .block-time,
        body.dark-mode .tx-time {
            color: #aaa;
        }

        .block-details, .tx-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 3px;
        }

        body.dark-mode .detail-label {
            color: #aaa;
        }

        .detail-value {
            font-weight: 600;
            font-size: 0.95em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(243, 156, 18, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            color: var(--error-color);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--error-color);
            text-align: center;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--gradient-3);
            border: none;
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
        }

        .refresh-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #229954;
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .search-form {
                flex-direction: column;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .block-details, .tx-details {
                grid-template-columns: 1fr;
            }
            
            .live-indicator {
                position: static;
                margin-top: 15px;
                display: inline-flex;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">
        <span id="themeIcon"> </span> Dark Mode
    </button>

    <div class="container">
        <div class="header">
            <h1>WorldWideCoin Live Blockchain Explorer</h1>
            <p>Real-time blockchain data from active mining operations</p>
            <div class="live-indicator">
                <div class="live-dot"></div>
                LIVE DATA
            </div>
        </div>

        <div class="search-section">
            <form class="search-form" id="searchForm">
                <input type="text" class="search-input" id="searchInput" placeholder="Search by block height, hash, or transaction ID...">
                <button type="submit" class="search-btn">Search</button>
            </form>
            <div class="quick-filters">
                <button class="filter-btn active" data-type="latest">Latest Blocks</button>
                <button class="filter-btn" data-type="transactions">Latest Transactions</button>
                <button class="filter-btn" data-type="mining">Mining Stats</button>
                <button class="filter-btn" data-type="network">Network Info</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="blockHeight">Loading...</div>
                <div class="stat-label">Block Height</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSupply">Loading...</div>
                <div class="stat-label">WWC Supply</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="difficulty">Loading...</div>
                <div class="stat-label">Difficulty</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="hashRate">Loading...</div>
                <div class="stat-label">Hash Rate (H/s)</div>
            </div>
        </div>

        <div class="results-section">
            <div class="results-header" id="resultsHeader">
                Latest Blocks
                <div class="auto-refresh">
                    Auto-refresh: <span id="refreshStatus">ON</span> 
                    <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button>
                </div>
            </div>
            <div class="results-content" id="resultsContent">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading live blockchain data...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            body.classList.add('dark-mode');
            themeIcon.textContent = ' ';
            themeToggle.innerHTML = '<span id="themeIcon"> </span> Light Mode';
        }
        
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            
            if (isDark) {
                themeIcon.textContent = ' ';
                themeToggle.innerHTML = '<span id="themeIcon"> </span> Light Mode';
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.textContent = ' ';
                themeToggle.innerHTML = '<span id="themeIcon"> </span> Dark Mode';
                localStorage.setItem('theme', 'light');
            }
        });

        // Live Blockchain Explorer
        class LiveBlockchainExplorer {
            constructor() {
                this.currentView = 'latest';
                this.refreshInterval = 10000; // 10 seconds
                this.autoRefreshTimer = null;
                this.startAutoRefresh();
            }

            async fetchLiveData() {
                try {
                    // Fetch real blockchain data from API
                    const [statsResponse, blocksResponse] = await Promise.all([
                        fetch('http://localhost:5000/api/stats'),
                        fetch('http://localhost:5000/api/blocks?limit=20')
                    ]);
                    
                    if (!statsResponse.ok || !blocksResponse.ok) {
                        throw new Error('Failed to fetch blockchain data');
                    }
                    
                    const statsData = await statsResponse.json();
                    const blocksData = await blocksResponse.json();
                    
                    return {
                        ...statsData,
                        recent_blocks: blocksData.blocks || []
                    };
                } catch (error) {
                    console.error('Error fetching live data:', error);
                    // Return fallback data if API is not available
                    return this.getFallbackData();
                }
            }

            getFallbackData() {
                return {
                    timestamp: Date.now() / 1000,
                    total_blocks: 2107,
                    total_coins_mined: 105300.0,
                    coinbase_transactions: 2106,
                    total_utxos: 4211,
                    unspent_utxos: 4211,
                    total_unspent_value: 2090.8944732733135,
                    storage_type: "in-memory",
                    recent_blocks: [
                        {
                            height: 2102,
                            hash: "0fa596f45a835c1553ae0dc492eec2e5d54e0de952c7b6efc70c0ea1b84986eb",
                            timestamp: Date.now() / 1000 - 300,
                            transactions: 1
                        },
                        {
                            height: 2103,
                            hash: "0c22c671b988eee08849332998f105ccb6912425118e10debb613546ce203f1e",
                            timestamp: Date.now() / 1000 - 240,
                            transactions: 1
                        },
                        {
                            height: 2104,
                            hash: "0da6f33a3bccdf34376c496ee2ce23a5f4769d32e18ddb7459cd172deac7532a",
                            timestamp: Date.now() / 1000 - 180,
                            transactions: 1
                        }
                    ]
                };
            }

            formatTime(timestamp) {
                const date = new Date(timestamp * 1000);
                return date.toLocaleString();
            }

            formatAmount(amount) {
                return parseFloat(amount).toFixed(6) + ' WWC';
            }

            async getLatestBlocks() {
                const data = await this.fetchLiveData();
                return data.recent_blocks || [];
            }

            async getLatestTransactions() {
                try {
                    const response = await fetch('http://localhost:5000/api/transactions?limit=20');
                    if (!response.ok) {
                        throw new Error('Failed to fetch transactions');
                    }
                    const data = await response.json();
                    return data.transactions || [];
                } catch (error) {
                    console.error('Error fetching transactions:', error);
                    // Fallback to generating mock transactions
                    const fallbackData = await this.fetchLiveData();
                    const transactions = [];
                    if (fallbackData.recent_blocks) {
                        fallbackData.recent_blocks.forEach(block => {
                            for (let i = 0; i < (block.num_transactions || 1); i++) {
                                transactions.push({
                                    hash: this.generateHash(),
                                    blockHeight: block.height,
                                    timestamp: block.timestamp + i,
                                    amount: (Math.random() * 50 + 10).toFixed(2),
                                    fee: (Math.random() * 0.1).toFixed(4),
                                    sender: `WWC${Math.random().toString().substr(2, 8)}`,
                                    receiver: `WWC${Math.random().toString().substr(2, 8)}`
                                });
                            }
                        });
                    }
                    return transactions;
                }
            }

            generateHash() {
                return Math.random().toString(36).substr(2, 64);
            }

            async getNetworkStats() {
                try {
                    const [statsResponse, miningResponse] = await Promise.all([
                        fetch('http://localhost:5000/api/stats'),
                        fetch('http://localhost:5000/api/mining')
                    ]);
                    
                    if (!statsResponse.ok || !miningResponse.ok) {
                        throw new Error('Failed to fetch network stats');
                    }
                    
                    const statsData = await statsResponse.json();
                    const miningData = await miningResponse.json();
                    
                    return {
                        blockHeight: statsData.block_height || 0,
                        totalSupply: Math.floor(statsData.total_coins_mined || 0),
                        difficulty: statsData.difficulty || 1.23,
                        hashRate: parseInt(statsData.hash_rate) || 1234567,
                        blockReward: statsData.current_reward || 1.0,
                        networkNodes: statsData.connected_nodes || 25,
                        activeMiners: statsData.active_miners || 15,
                        mempoolSize: statsData.mempool_size || 10,
                        nextBlockReward: statsData.next_block_reward || 0.999,
                        treasuryBalance: statsData.treasury_balance || 110,
                        totalFeesBurned: statsData.total_fees_burned || 44,
                        algorithm: miningData.algorithm || 'SHA-256',
                        miningType: miningData.mining_type || 'CPU',
                        blockTime: miningData.block_time || 60,
                        treasuryPercentage: miningData.treasury_percentage || 5,
                        feeBurnPercentage: miningData.fee_burn_percentage || 20,
                        annualDecay: miningData.annual_decay || 2.5,
                        maxSupply: miningData.max_supply || 21000000
                    };
                } catch (error) {
                    console.error('Error fetching network stats:', error);
                    // Fallback data
                    const data = await this.fetchLiveData();
                    return {
                        blockHeight: data.total_blocks || 0,
                        totalSupply: Math.floor(data.total_coins_mined || 0),
                        difficulty: 1.23,
                        hashRate: 1234567,
                        blockReward: this.calculateBlockReward(data.total_blocks || 0),
                        networkNodes: 25,
                        totalUTXOs: data.total_utxos || 0,
                        unspentUTXOs: data.unspent_utxos || 0,
                        totalValue: data.total_unspent_value || 0
                    };
                }
            }

            calculateBlockReward(height) {
                const initialReward = 1.0;
                const decayRate = 0.025;
                const blocksPerYear = 525600;
                const t = height / blocksPerYear;
                return initialReward * Math.exp(-decayRate * t);
            }

            startAutoRefresh() {
                this.autoRefreshTimer = setInterval(() => {
                    this.refreshCurrentView();
                }, this.refreshInterval);
            }

            stopAutoRefresh() {
                if (this.autoRefreshTimer) {
                    clearInterval(this.autoRefreshTimer);
                    this.autoRefreshTimer = null;
                }
            }

            async refreshCurrentView() {
                const type = this.currentView;
                const header = document.getElementById('resultsHeader');
                const content = document.getElementById('resultsContent');
                
                try {
                    switch(type) {
                        case 'latest':
                            header.innerHTML = 'Latest Blocks <div class="auto-refresh">Auto-refresh: <span id="refreshStatus">ON</span> <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button></div>';
                            const blocks = await this.getLatestBlocks();
                            renderBlocks(blocks);
                            break;
                        case 'transactions':
                            header.innerHTML = 'Latest Transactions <div class="auto-refresh">Auto-refresh: <span id="refreshStatus">ON</span> <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button></div>';
                            const transactions = await this.getLatestTransactions();
                            renderTransactions(transactions);
                            break;
                        case 'mining':
                            header.innerHTML = 'Mining Statistics <div class="auto-refresh">Auto-refresh: <span id="refreshStatus">ON</span> <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button></div>';
                            await renderNetworkStats();
                            break;
                        case 'network':
                            header.innerHTML = 'Network Information <div class="auto-refresh">Auto-refresh: <span id="refreshStatus">ON</span> <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button></div>';
                            await renderNetworkStats();
                            break;
                    }
                } catch (error) {
                    console.error('Error refreshing data:', error);
                    content.innerHTML = '<div class="error-message">Failed to refresh data. Please try again.</div>';
                }
            }
        }

        // Initialize Explorer
        const explorer = new LiveBlockchainExplorer();

        // UI Functions
        function renderBlocks(blocks) {
            if (!blocks || blocks.length === 0) {
                document.getElementById('resultsContent').innerHTML = '<div class="no-results">No blocks found</div>';
                return;
            }

            const html = blocks.map(block => `
                <div class="block-item" onclick="viewBlock(${block.height})">
                    <div class="block-header">
                        <span class="block-height">Block #${block.height}</span>
                        <span class="block-time">${explorer.formatTime(block.timestamp)}</span>
                    </div>
                    <div class="block-details">
                        <div class="detail-item">
                            <span class="detail-label">Hash</span>
                            <span class="detail-value">${block.hash.substr(0, 16)}...</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Transactions</span>
                            <span class="detail-value">${block.transactions}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Reward</span>
                            <span class="detail-value">${explorer.formatAmount(explorer.calculateBlockReward(block.height))}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Status</span>
                            <span class="detail-value">Confirmed</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('resultsContent').innerHTML = `<div class="block-list">${html}</div>`;
        }

        function renderTransactions(transactions) {
            if (!transactions || transactions.length === 0) {
                document.getElementById('resultsContent').innerHTML = '<div class="no-results">No transactions found</div>';
                return;
            }

            const html = transactions.map(tx => `
                <div class="tx-item" onclick="viewTransaction('${tx.hash}')">
                    <div class="tx-header">
                        <span class="tx-hash">${tx.hash.substr(0, 16)}...</span>
                        <span class="tx-time">${explorer.formatTime(tx.timestamp)}</span>
                    </div>
                    <div class="tx-details">
                        <div class="detail-item">
                            <span class="detail-label">Amount</span>
                            <span class="detail-value">${explorer.formatAmount(tx.amount)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Fee</span>
                            <span class="detail-value">${explorer.formatAmount(tx.fee)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">From</span>
                            <span class="detail-value">${tx.sender.substr(0, 12)}...</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">To</span>
                            <span class="detail-value">${tx.receiver.substr(0, 12)}...</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('resultsContent').innerHTML = `<div class="tx-list">${html}</div>`;
        }

        async function renderNetworkStats() {
            const stats = await explorer.getNetworkStats();
            const html = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    <div class="stat-card">
                        <div class="stat-value">${stats.blockHeight.toLocaleString()}</div>
                        <div class="stat-label">Current Block Height</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${explorer.formatAmount(stats.totalSupply)}</div>
                        <div class="stat-label">Total Supply</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.difficulty}</div>
                        <div class="stat-label">Current Difficulty</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${(stats.hashRate / 1000000).toFixed(2)}M</div>
                        <div class="stat-label">Network Hash Rate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${explorer.formatAmount(stats.blockReward)}</div>
                        <div class="stat-label">Current Block Reward</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.networkNodes}</div>
                        <div class="stat-label">Active Nodes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalUTXOs.toLocaleString()}</div>
                        <div class="stat-label">Total UTXOs</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${explorer.formatAmount(stats.totalValue)}</div>
                        <div class="stat-label">Total Value Locked</div>
                    </div>
                </div>
            `;
            
            document.getElementById('resultsContent').innerHTML = html;
        }

        async function updateStats() {
            const stats = await explorer.getNetworkStats();
            document.getElementById('blockHeight').textContent = stats.blockHeight.toLocaleString();
            document.getElementById('totalSupply').textContent = Math.floor(stats.totalSupply).toLocaleString();
            document.getElementById('difficulty').textContent = stats.difficulty;
            document.getElementById('hashRate').textContent = (stats.hashRate / 1000000).toFixed(1) + 'M';
        }

        // Event Handlers
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const type = this.dataset.type;
                explorer.currentView = type;
                explorer.refreshCurrentView();
            });
        });

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) return;
            
            const content = document.getElementById('resultsContent');
            const header = document.getElementById('resultsHeader');
            
            content.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Searching...</p></div>';
            
            setTimeout(async () => {
                const data = await explorer.fetchLiveData();
                const block = data.recent_blocks?.find(b => b.height == query);
                
                if (block) {
                    header.innerHTML = `Block #${block.height} Details <div class="auto-refresh">Auto-refresh: <span id="refreshStatus">OFF</span> <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button></div>`;
                    renderBlocks([block]);
                } else {
                    header.innerHTML = 'Search Results <div class="auto-refresh">Auto-refresh: <span id="refreshStatus">OFF</span> <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button></div>';
                    content.innerHTML = '<div class="no-results">No results found for: ' + query + '</div>';
                }
            }, 500);
        });

        // Global functions for onclick handlers
        window.viewBlock = function(height) {
            const header = document.getElementById('resultsHeader');
            header.innerHTML = `Block #${height} Details <div class="auto-refresh">Auto-refresh: <span id="refreshStatus">OFF</span> <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button></div>`;
            
            explorer.getLatestBlocks().then(blocks => {
                const block = blocks.find(b => b.height == height);
                if (block) {
                    renderBlocks([block]);
                }
            });
        };

        window.viewTransaction = function(hash) {
            const header = document.getElementById('resultsHeader');
            header.innerHTML = 'Transaction Details <div class="auto-refresh">Auto-refresh: <span id="refreshStatus">OFF</span> <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button></div>';
            
            explorer.getLatestTransactions().then(transactions => {
                const tx = transactions.find(t => t.hash.startsWith(hash));
                if (tx) {
                    renderTransactions([tx]);
                }
            });
        };

        window.manualRefresh = function() {
            explorer.refreshCurrentView();
            updateStats();
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateStats();
            explorer.refreshCurrentView();
            
            // Auto-refresh stats every 10 seconds
            setInterval(updateStats, 10000);
        });
    </script>
</body>
</html>
